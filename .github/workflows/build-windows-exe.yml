name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'requirements.txt'
      - '.github/workflows/build-windows-exe.yml'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write   # GitHub Release を作成するために必要

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Embed build version into src/_version.py
        shell: bash
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > src/_version.py <<EOF
          """ビルド時に CI が書き換える。直接編集しない。"""

          __version__ = "${GITHUB_SHA::7}"
          __build_sha__ = "${GITHUB_SHA}"
          __build_time__ = "${BUILD_TIME}"
          EOF
          cat src/_version.py

      - name: Build EXE with PyInstaller (onedir)
        run: |
          pyinstaller `
            --onedir `
            --windowed `
            --name Roster `
            --add-data "assets;assets" `
            --collect-all PySide6 `
            --collect-data certifi `
            --hidden-import certifi `
            --hidden-import src `
            --hidden-import src.main `
            --hidden-import src.config `
            --hidden-import src.db `
            --hidden-import src.db.models `
            --hidden-import src.db.repository `
            --hidden-import src.services `
            --hidden-import src.services.employee_service `
            --hidden-import src.services.photo_service `
            --hidden-import src.services.excel_export_service `
            --hidden-import src.services.update_service `
            --hidden-import src._version `
            --hidden-import src.gui `
            --hidden-import src.gui.main_window `
            --hidden-import src.gui.employee_tab `
            --hidden-import src.gui.export_tab `
            --hidden-import src.gui.dialogs `
            --hidden-import src.gui.dialogs.employee_edit_dialog `
            --hidden-import src.gui.dialogs.ambiguity_dialog `
            --hidden-import src.lock `
            --hidden-import src.cli `
            --hidden-import src.cli.build_from_master `
            --paths . `
            app.py

      - name: Verify build
        run: |
          if (Test-Path dist/Roster/Roster.exe) {
            $size = (Get-Item dist/Roster/Roster.exe).Length / 1MB
            Write-Host "✅ Roster onedir built: Roster.exe = $($size.ToString('0.0')) MB"
          } else {
            Write-Error "dist/Roster/Roster.exe not found"
            exit 1
          }

      - name: Package as Roster.zip (onedir folder → zip)
        run: |
          Push-Location dist
          Compress-Archive -Path Roster -DestinationPath Roster.zip -CompressionLevel Optimal -Force
          Pop-Location
          $zipsize = (Get-Item dist/Roster.zip).Length / 1MB
          Write-Host "✅ Roster.zip = $($zipsize.ToString('0.0')) MB"

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA:0:7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Delete previous "latest" release (keep only the newest)
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Windows Build (onedir zip)"
          body: |
            自動ビルドされた Windows アプリ（onedir 形式）

            - ビルド日時: ${{ github.event.head_commit.timestamp }}
            - コミット: ${{ github.sha }}
            - ファイル: `Roster.zip` （展開すると Roster/Roster.exe ）

            zip を展開後、`Roster/Roster.exe` をダブルクリックで起動できます。
            onefile 版に比べて起動が大幅に高速化されています。
          files: dist/Roster.zip
          prerelease: false
          make_latest: true
