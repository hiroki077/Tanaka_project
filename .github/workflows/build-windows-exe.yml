name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'requirements.txt'
      - '.github/workflows/build-windows-exe.yml'
  workflow_dispatch:  # 手動実行も可能

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name MikiApp `
            --add-data "assets;assets" `
            --collect-all PySide6 `
            src/main.py

      - name: Verify build
        run: |
          if (Test-Path dist/MikiApp.exe) {
            $size = (Get-Item dist/MikiApp.exe).Length / 1MB
            Write-Host "✅ MikiApp.exe built: $($size.ToString('0.0')) MB"
          } else {
            Write-Error "MikiApp.exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikiApp-windows-exe
          path: dist/MikiApp.exe
          retention-days: 30
